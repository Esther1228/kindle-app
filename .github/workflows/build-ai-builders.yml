name: Build AI Builders Digest

on:
  schedule:
    # GitHub Actions uses UTC. 00:15 UTC = 08:15 Asia/Shanghai.
    - cron: '15 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: ai-builders-daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate AI Builders digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node ai-builder/scripts/generate-kindle-digest.js

      - name: Build Kindle daily data
        run: node ai-builder/scripts/build-kindle-daily.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-builder/kindle-digest.json data/
          git diff --cached --quiet && echo "No changes" || \
            (git commit -m "chore: update AI Builders digest" && git push)
